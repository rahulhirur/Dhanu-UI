<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DhanUI - Robot Control Interface</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e1117;
        }
        .header-bar {
            background-color: #161b22;
            color: #c9d1d9;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #30363d;
            height: 40px;
        }
        .logo {
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-links a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        .iframe-container {
            width: 100%;
            height: calc(100% - 61px);
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="logo">
            <span>🤖</span> DhanUI - Robot Control Portal
        </div>
        <div class="nav-links">
            <a href="https://github.com/rahulhirur/Dhanu-UI" target="_blank">View on GitHub</a>
        </div>
    </div>
    <div class="iframe-container">
        <!-- 
          Hugging Face Space Embed Frame. 
          Make sure to keep 'allow="camera; microphone;"' to enable webcam/mic access.
        -->
        <iframe 
            src="https://huggingface.co/spaces/rahulhirur/Dhanu-UI?embed=true" 
            allow="camera; microphone; clipboard-read; clipboard-write; geolocation"
        ></iframe>
    </div>
</body>
</html>
