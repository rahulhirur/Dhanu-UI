name: Build, Test and Deploy DhanUI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Install with uv, lint & test ──────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v

  # ── Job 2: Deploy to owner's HF Space ────────────────────────────────────
  deploy-hf-owner:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to rahulhirur/Dhanu-UI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://rahulhirur:$HF_TOKEN@huggingface.co/spaces/rahulhirur/Dhanu-UI \
            main

  # ── Job 3: Deploy to friend's HF Space ───────────────────────────────────
  deploy-hf-friend:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to friendusername/Dhanu-UI
        env:
          # Add HF_TOKEN_FRIEND to your GitHub repository secrets.
          # Value = your friend's HF write token.
          # Update the username in the URL below when known.
          HF_TOKEN_FRIEND: ${{ secrets.HF_TOKEN_FRIEND }}
        run: |
          git push --force \
            https://friendusername:$HF_TOKEN_FRIEND@huggingface.co/spaces/friendusername/Dhanu-UI \
            main

  # ── Job 4: Deploy GitHub Pages ────────────────────────────────────────────
  deploy-pages:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload docs/
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
